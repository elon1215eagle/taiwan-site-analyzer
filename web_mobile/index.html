<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="吉多選址">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>吉多店面選址分析器</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --accent: #b45309;
      --high: #047857;
      --medium: #b45309;
      --low: #b42318;
      --shadow: 0 10px 26px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      line-height: 1.55;
    }

    button, input { font: inherit; }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      min-height: 100svh;
      padding-bottom: 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 247, 249, .94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .status-pill {
      flex: 0 0 auto;
      border: 1px solid #9ccfc8;
      color: var(--brand-dark);
      background: #e8f7f4;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .install-button {
      display: none;
      width: 100%;
      min-height: 40px;
      margin-top: 10px;
      border: 1px solid #9ccfc8;
      border-radius: 8px;
      background: #e8f7f4;
      color: var(--brand-dark);
      font-weight: 900;
      cursor: pointer;
    }

    .search {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 8px;
      align-items: center;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 12px;
      outline: none;
      box-shadow: 0 1px 0 rgba(16, 24, 40, .03);
    }

    input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15, 118, 110, .14); }

    .icon-button {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: white;
      font-size: 22px;
      font-weight: 900;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .icon-button:active { transform: translateY(1px); background: var(--brand-dark); }

    .quick-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 0 2px;
      scrollbar-width: none;
    }

    .quick-list::-webkit-scrollbar { display: none; }

    .quick {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    main { padding: 14px 16px 0; }

    .summary {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 14px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }

    .score-ring {
      width: 106px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--brand) calc(var(--score, 0) * 1%), #e6eaf0 0);
      position: relative;
    }

    .score-ring::after {
      content: "";
      position: absolute;
      inset: 10px;
      background: white;
      border-radius: 50%;
    }

    .score-value {
      position: relative;
      z-index: 1;
      font-size: 28px;
      font-weight: 900;
    }

    .summary h2 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.25;
    }

    .summary p { margin: 0; color: var(--muted); font-size: 14px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .section-title {
      margin: 18px 0 8px;
      color: #344054;
      font-size: 14px;
      font-weight: 900;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
    }

    .metric-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .metric-name { font-weight: 850; }
    .metric-score { font-weight: 900; font-size: 20px; }

    .bar {
      height: 8px;
      background: #e9edf3;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar span {
      display: block;
      width: calc(var(--value, 0) * 1%);
      height: 100%;
      background: var(--brand);
    }

    .level {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      color: white;
      background: var(--medium);
    }

    .level.high, .level.高 { background: var(--high); }
    .level.low, .level.低 { background: var(--low); }

    .reason {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .restaurant-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .mini {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 8px;
      background: #fbfcfe;
      min-height: 72px;
    }

    .mini strong { display: block; font-size: 20px; }
    .mini span { color: var(--muted); font-size: 12px; }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 18px 0 8px;
    }

    .tab {
      height: 40px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      font-weight: 850;
      color: #344054;
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--brand);
      background: #e8f7f4;
      color: var(--brand-dark);
    }

    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin: 0;
      background: #111827;
      color: #f8fafc;
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
    }

    .report {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: #26313f;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty {
      background: white;
      border: 1px dashed #b8c1cc;
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
    }

    .loading {
      display: none;
      margin-top: 10px;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .error {
      display: none;
      margin-top: 10px;
      color: var(--low);
      font-size: 13px;
      font-weight: 800;
    }

    .source-table {
      display: grid;
      gap: 8px;
    }

    .source-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfe;
    }

    .source-row strong {
      color: #26313f;
      font-size: 13px;
    }

    .source-row span {
      color: var(--muted);
      font-size: 13px;
    }

    .source-row em {
      display: block;
      color: var(--brand-dark);
      font-style: normal;
      font-weight: 800;
      margin-top: 3px;
    }

    @media (min-width: 680px) {
      .grid.two { grid-template-columns: 1fr 1fr; }
      .grid.four { grid-template-columns: repeat(4, 1fr); }
      .summary { grid-template-columns: 132px 1fr; }
      .score-ring { width: 120px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-row">
        <h1>吉多店面選址分析器</h1>
        <span class="status-pill">手機版</span>
      </div>
      <form id="searchForm" class="search">
        <input id="locationInput" autocomplete="street-address" placeholder="輸入縣市、區域、路段或地標" value="高雄市 左營區 巨蛋商圈">
        <button class="icon-button" type="submit" aria-label="開始分析">›</button>
      </form>
      <div class="quick-list" aria-label="快速範例">
        <button class="quick" type="button">高雄市 左營區 巨蛋商圈</button>
        <button class="quick" type="button">台南市 中西區 國華街</button>
        <button class="quick" type="button">台北市 大安區 忠孝復興站</button>
        <button class="quick" type="button">台中市 西屯區 逢甲商圈</button>
      </div>
      <div id="loading" class="loading">分析中，正在整理商圈、人潮、車潮與競爭資料...</div>
      <div id="error" class="error"></div>
      <button id="installButton" class="install-button" type="button">安裝到手機桌面</button>
    </header>

    <main>
      <div id="empty" class="empty">輸入地點後，即可查看四時段人潮、汽機車車潮、餐飲競爭與 JSON。</div>
      <section id="result" hidden></section>
    </main>
  </div>

  <script>
    const form = document.querySelector("#searchForm");
    const input = document.querySelector("#locationInput");
    const resultEl = document.querySelector("#result");
    const emptyEl = document.querySelector("#empty");
    const loadingEl = document.querySelector("#loading");
    const errorEl = document.querySelector("#error");
    const installButton = document.querySelector("#installButton");
    const API_BASE = location.protocol === "file:" ? "http://127.0.0.1:8787" : "";
    let deferredInstallPrompt = null;

    const dataStack = [
      ["地理編碼", "地址轉座標", "Google Geocoding API / TomTom"],
      ["車潮分析", "汽車、機車流量", "TDX VD 即時車流 API"],
      ["人潮分析", "早中晚半夜人潮強度", "人口密度 + VD 車流 + 餐飲密度代理"],
      ["餐飲競爭", "附近餐飲店數與類型", "Google Places API / OpenStreetMap"],
      ["程式架構", "資料處理與 API 串接", "Python 3.11 + 模組化設計"]
    ];

    const periodNames = { morning: "早上", noon: "中午", evening: "晚上", midnight: "半夜" };
    const levelText = { high: "高", medium: "中", low: "低" };

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      analyze(input.value.trim());
    });

    document.querySelectorAll(".quick").forEach((button) => {
      button.addEventListener("click", () => {
        input.value = button.textContent.trim();
        analyze(input.value);
      });
    });

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installButton.style.display = "block";
    });

    installButton.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installButton.style.display = "none";
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }

    async function analyze(location) {
      if (!location) {
        showError("請先輸入縣市、行政區、路段或地標。");
        return;
      }
      setLoading(true);
      hideError();
      try {
        const response = await fetch(`${API_BASE}/api/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ location })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.message || "分析失敗");
        render(payload.json, payload.report);
      } catch (error) {
        showError(error.message || "系統暫時無法分析，請稍後再試。");
      } finally {
        setLoading(false);
      }
    }

    function render(data, report) {
      emptyEl.hidden = true;
      resultEl.hidden = false;
      const restaurant = data.restaurant_analysis;
      const dataQuality = data.data_quality || { score: 0, level: "low", signals: [] };
      resultEl.innerHTML = `
        <section class="summary">
          <div class="score-ring" style="--score:${data.overall_score}">
            <div class="score-value">${data.overall_score}</div>
          </div>
          <div>
            <h2>${escapeHtml(data.geo_scope.county)}${escapeHtml(data.geo_scope.district)} ${escapeHtml(data.geo_scope.address_or_landmark)}</h2>
            <p>${escapeHtml(data.overall_conclusion)}</p>
          </div>
        </section>

        <h3 class="section-title">四時段人潮</h3>
        <section class="grid four">${Object.entries(data.crowd_analysis).map(([key, item]) => metricCard(periodNames[key], item)).join("")}</section>

        <h3 class="section-title">汽機車車潮</h3>
        <section class="grid two">
          ${metricCard("汽車", data.traffic_analysis.car)}
          ${metricCard("機車", data.traffic_analysis.motorcycle)}
        </section>

        <h3 class="section-title">餐飲競爭</h3>
        <section class="card">
          <div class="restaurant-row">
            <div class="mini"><strong>${restaurant.nearby_count}</strong><span>3km 店數</span></div>
            <div class="mini"><strong>${restaurant.density_level}</strong><span>密度</span></div>
            <div class="mini"><strong>${restaurant.competition_level}</strong><span>競爭</span></div>
          </div>
          ${restaurant.counts_by_radius ? `<p class="reason">半徑分布：1km ${restaurant.counts_by_radius["1km"] ?? 0} 家、2km ${restaurant.counts_by_radius["2km"] ?? 0} 家、3km ${restaurant.counts_by_radius["3km"] ?? 0} 家</p>` : ""}
          <p class="reason">${escapeHtml(restaurant.reason)}</p>
          <div class="section-title">類型分布</div>
          ${restaurant.category_summary.map(item => `<p class="reason">${escapeHtml(item.category)}：${item.count}</p>`).join("")}
        </section>

        <h3 class="section-title">資料精準度</h3>
        <section class="card">
          <div class="restaurant-row">
            <div class="mini"><strong>${dataQuality.score}</strong><span>可信度</span></div>
            <div class="mini"><strong>${levelText[dataQuality.level] || dataQuality.level}</strong><span>等級</span></div>
          </div>
          ${dataQuality.signals.map(item => `<p class="reason">‧ ${escapeHtml(item)}</p>`).join("")}
        </section>

        <h3 class="section-title">資料限制</h3>
        <section class="card">${data.warnings.map(item => `<p class="reason">• ${escapeHtml(item)}</p>`).join("")}</section>

        <h3 class="section-title">資料來源/API 架構</h3>
        <section class="card">
          <div class="source-table">
            ${dataStack.map(row => `
              <div class="source-row">
                <strong>${escapeHtml(row[0])}</strong>
                <span>${escapeHtml(row[1])}<em>${escapeHtml(row[2])}</em></span>
              </div>
            `).join("")}
          </div>
        </section>

        <div class="tabs">
          <button class="tab active" type="button" data-view="report">中文報告</button>
          <button class="tab" type="button" data-view="json">JSON</button>
        </div>
        <section id="reportView" class="report">${escapeHtml(report)}</section>
        <pre id="jsonView" hidden>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
      `;
      resultEl.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => switchTab(tab.dataset.view));
      });
    }

    function metricCard(name, item) {
      const zhLevel = levelText[item.level] || item.level;
      return `
        <article class="card">
          <div class="metric-head">
            <div class="metric-name">${escapeHtml(name)}</div>
            <div class="metric-score">${item.score}</div>
          </div>
          <div class="bar" style="--value:${item.score}"><span></span></div>
          <span class="level ${item.level}">${zhLevel}</span>
          <p class="reason">${escapeHtml(item.reason)}</p>
        </article>
      `;
    }

    function switchTab(view) {
      resultEl.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      resultEl.querySelector("#reportView").hidden = view !== "report";
      resultEl.querySelector("#jsonView").hidden = view !== "json";
    }

    function setLoading(isLoading) {
      loadingEl.style.display = isLoading ? "block" : "none";
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function hideError() {
      errorEl.textContent = "";
      errorEl.style.display = "none";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
