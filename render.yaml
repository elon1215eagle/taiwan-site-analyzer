services:
  - type: web
    name: taiwan-site-analyzer
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: TDX_CLIENT_ID
        sync: false
      - key: TDX_CLIENT_SECRET
        sync: false
      - key: TDX_VD_URL
        sync: false
